<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>京东退货详情修改器</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: #f4f5f7;
      color: #16181d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 28px;
      background:
        radial-gradient(circle at top left, rgba(217, 48, 37, .10), transparent 34%),
        linear-gradient(180deg, #fbfbfc 0%, #f1f2f4 100%);
    }

    main {
      width: min(1120px, 100%);
      margin: 0 auto;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 28px 4px 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: #636873;
      font-size: 16px;
      line-height: 1.7;
    }

    .template-pill {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #e8e9ed;
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, .82);
      box-shadow: 0 10px 24px rgba(17, 24, 39, .06);
      color: #3e424b;
      font-size: 14px;
    }

    .template-pill::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #18a058;
      box-shadow: 0 0 0 4px rgba(24, 160, 88, .12);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 18px;
      align-items: start;
    }

    .surface {
      background: rgba(255, 255, 255, .94);
      border: 1px solid #e4e6ea;
      border-radius: 8px;
      box-shadow: 0 18px 42px rgba(16, 24, 40, .08);
    }

    .form-panel {
      padding: 26px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }

    h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .field {
      min-width: 0;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin: 0 0 8px;
      color: #545b66;
      font-size: 14px;
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #d8dbe2;
      border-radius: 8px;
      padding: 13px 14px;
      background: #fff;
      color: #15171c;
      outline: none;
      font: inherit;
      font-size: 16px;
      transition: border-color .16s ease, box-shadow .16s ease, background-color .16s ease;
    }

    textarea {
      min-height: 132px;
      resize: vertical;
      line-height: 1.7;
    }

    input:focus,
    textarea:focus {
      border-color: #d93025;
      box-shadow: 0 0 0 4px rgba(217, 48, 37, .12);
      background: #fff;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 22px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 13px 18px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, background-color .16s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    button.primary {
      min-width: 168px;
      color: #fff;
      background: #d93025;
      box-shadow: 0 10px 22px rgba(217, 48, 37, .20);
    }

    button.primary:hover {
      background: #c9251b;
      box-shadow: 0 12px 26px rgba(217, 48, 37, .24);
    }

    button.ghost {
      color: #444b57;
      background: #f1f2f4;
    }

    button.ghost:hover {
      background: #e8eaee;
    }

    button.text {
      padding: 0;
      color: #7b828d;
      background: transparent;
      font-weight: 700;
    }

    button.text:hover {
      color: #d93025;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .55;
      transform: none;
      box-shadow: none;
    }

    .message {
      min-height: 22px;
      margin-top: 14px;
      color: #5f6672;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.error {
      color: #b42318;
    }

    .history-panel {
      overflow: hidden;
    }

    .history-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 20px 20px 14px;
      border-bottom: 1px solid #eceef2;
    }

    .history-count {
      color: #7b828d;
      font-size: 13px;
    }

    .history-list {
      max-height: 520px;
      overflow: auto;
      padding: 10px;
    }

    .empty {
      padding: 34px 18px;
      text-align: center;
      color: #7b828d;
      line-height: 1.7;
      font-size: 14px;
    }

    .history-item {
      width: 100%;
      display: block;
      text-align: left;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 13px;
      background: transparent;
      color: inherit;
      cursor: pointer;
    }

    .history-item:hover {
      border-color: #e5e7eb;
      background: #fafafa;
      box-shadow: none;
    }

    .history-name {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: #171a20;
      font-weight: 800;
      line-height: 1.4;
    }

    .history-phone {
      flex: 0 0 auto;
      color: #6b7280;
      font-weight: 600;
    }

    .history-address {
      margin-top: 7px;
      color: #59606b;
      font-size: 13px;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .history-time {
      margin-top: 8px;
      color: #9aa1ac;
      font-size: 12px;
    }

    @media (max-width: 900px) {
      body {
        padding: 18px;
      }

      .hero {
        display: block;
      }

      .template-pill {
        margin-top: 16px;
      }

      .workspace {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      body {
        padding: 12px;
      }

      .hero {
        padding: 16px 2px 18px;
      }

      .form-panel {
        padding: 18px;
      }

      .field-grid {
        grid-template-columns: 1fr;
      }

      .actions {
        align-items: stretch;
        flex-direction: column;
      }

      button.primary,
      button.ghost {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div>
        <h1>京东退货详情修改器</h1>
        <p class="subtitle">填写商品寄回信息，直接打开修改后的页面。历史记录保存在当前浏览器。</p>
      </div>
      <div class="template-pill" id="templateStatus">无需登录</div>
    </section>

    <section class="workspace">
      <div class="surface form-panel">
        <div class="panel-title">
          <h2>商品寄回地址</h2>
        </div>

        <div class="field-grid">
          <div class="field full">
            <label for="address">寄回地址</label>
            <textarea id="address" autocomplete="street-address" placeholder="请输入完整寄回地址"></textarea>
          </div>

          <div class="field">
            <label for="name">收件人</label>
            <input id="name" autocomplete="name" placeholder="请输入收件人">
          </div>

          <div class="field">
            <label for="phone">联系电话</label>
            <input id="phone" autocomplete="tel" placeholder="请输入联系电话">
          </div>
        </div>

        <div class="actions">
          <button id="generate" class="primary">生成并打开页面</button>
          <button id="resetForm" class="ghost" type="button">清空</button>
        </div>

        <div id="message" class="message"></div>
      </div>

      <aside class="surface history-panel">
        <div class="history-head">
          <div>
            <h2>历史记录</h2>
            <div class="history-count" id="historyCount">本机缓存</div>
          </div>
          <button id="clearHistory" class="text" type="button">清空</button>
        </div>
        <div id="historyList" class="history-list"></div>
      </aside>
    </section>
  </main>

  <script src="template.js"></script>
  <script>
    const template = window.JD_RETURN_TEMPLATE || "";
    const historyKey = "jd-return-editor-history-v1";
    const maxHistory = 12;

    const addressInput = document.getElementById("address");
    const nameInput = document.getElementById("name");
    const phoneInput = document.getElementById("phone");
    const generateButton = document.getElementById("generate");
    const resetButton = document.getElementById("resetForm");
    const messageBox = document.getElementById("message");
    const templateStatus = document.getElementById("templateStatus");
    const historyList = document.getElementById("historyList");
    const historyCount = document.getElementById("historyCount");
    const clearHistoryButton = document.getElementById("clearHistory");

    const replacements = [
      {
        label: "寄回地址",
        getValue: () => addressInput.value.trim(),
        tokens: ["{{RETURN_ADDRESS}}", "{{USER_INPUT}}", "{{ADDRESS}}"],
        defaults: []
      },
      {
        label: "收件人",
        getValue: () => nameInput.value.trim(),
        tokens: ["{{RETURN_NAME}}", "{{NAME}}"],
        defaults: ["肖稳"]
      },
      {
        label: "联系电话",
        getValue: () => phoneInput.value.trim(),
        tokens: ["{{RETURN_PHONE}}", "{{PHONE}}"],
        defaults: ["17703790089"]
      }
    ];

    function htmlEscape(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function escapeRegExp(value) {
      return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function replaceAllLiteral(html, search, value) {
      const escapedValue = htmlEscape(value);
      const next = html.replace(new RegExp(escapeRegExp(search), "g"), () => escapedValue);
      return { html: next, count: html === next ? 0 : html.split(search).length - 1 };
    }

    function loadHistory() {
      try {
        const parsed = JSON.parse(localStorage.getItem(historyKey) || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveHistory(items) {
      localStorage.setItem(historyKey, JSON.stringify(items.slice(0, maxHistory)));
    }

    function formatTime(value) {
      return new Intl.DateTimeFormat("zh-CN", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(value));
    }

    function setMessage(text, type = "") {
      messageBox.textContent = text;
      messageBox.className = `message${type ? ` ${type}` : ""}`;
    }

    function currentRecord() {
      return {
        address: addressInput.value.trim(),
        name: nameInput.value.trim(),
        phone: phoneInput.value.trim(),
        createdAt: Date.now()
      };
    }

    function validate(record) {
      if (!record.address) return "请填写寄回地址。";
      if (!record.name) return "请填写收件人。";
      if (!record.phone) return "请填写联系电话。";
      return "";
    }

    function remember(record) {
      const key = `${record.address}|${record.name}|${record.phone}`;
      const next = [
        record,
        ...loadHistory().filter((item) => `${item.address}|${item.name}|${item.phone}` !== key)
      ];
      saveHistory(next);
      renderHistory();
    }

    function fillForm(record) {
      addressInput.value = record.address || "";
      nameInput.value = record.name || "";
      phoneInput.value = record.phone || "";
      setMessage("已填入历史记录。");
    }

    function renderHistory() {
      const items = loadHistory();
      historyCount.textContent = items.length ? `${items.length} 条本机缓存` : "暂无缓存";
      clearHistoryButton.disabled = items.length === 0;

      if (!items.length) {
        historyList.innerHTML = '<div class="empty">生成页面后会自动保存到这里。<br>记录只保存在当前浏览器。</div>';
        return;
      }

      historyList.innerHTML = "";
      for (const item of items) {
        const button = document.createElement("button");
        button.className = "history-item";
        button.type = "button";
        button.innerHTML = `
          <div class="history-name">
            <span>${htmlEscape(item.name || "未命名")}</span>
            <span class="history-phone">${htmlEscape(item.phone || "")}</span>
          </div>
          <div class="history-address">${htmlEscape(item.address || "")}</div>
          <div class="history-time">${formatTime(item.createdAt || Date.now())}</div>
        `;
        button.addEventListener("click", () => fillForm(item));
        historyList.appendChild(button);
      }
    }

    function buildHtml() {
      let html = template;
      let total = 0;

      for (const item of replacements) {
        const value = item.getValue();
        if (!value) continue;

        let count = 0;
        for (const token of item.tokens) {
          const result = replaceAllLiteral(html, token, value);
          html = result.html;
          count += result.count;
        }

        if (count === 0) {
          for (const defaultValue of item.defaults) {
            const result = replaceAllLiteral(html, defaultValue, value);
            html = result.html;
            count += result.count;
          }
        }

        total += count;
      }

      return { html, total };
    }

    function openHtml(html) {
      const blob = new Blob([html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      window.location.href = url;
    }

    generateButton.addEventListener("click", () => {
      const record = currentRecord();
      const error = validate(record);
      if (error) {
        setMessage(error, "error");
        return;
      }

      const { html, total } = buildHtml();
      if (html === template || total === 0) {
        setMessage("没有找到可替换的内容，请检查内置模板。", "error");
        return;
      }

      remember(record);
      setMessage("已生成页面，正在打开...");
      openHtml(html);
    });

    resetButton.addEventListener("click", () => {
      addressInput.value = "";
      nameInput.value = "";
      phoneInput.value = "";
      addressInput.focus();
      setMessage("");
    });

    clearHistoryButton.addEventListener("click", () => {
      localStorage.removeItem(historyKey);
      renderHistory();
      setMessage("历史记录已清空。");
    });

    if (!template) {
      templateStatus.textContent = "模板未加载";
      generateButton.disabled = true;
      setMessage("未读取到内置模板。", "error");
    } else {
      templateStatus.textContent = "无需登录";
    }

    renderHistory();
  </script>
</body>
</html>
